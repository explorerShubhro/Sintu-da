<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Glamour Hair Art</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f4ef;
      --card: #ffffff;
      --ink: #1c1c1c;
      --ink-light: #6b6b6b;
      --accent: #b5451b;
      --accent-light: #fdf0ec;
      --green: #1a9e5c;
      --green-light: #e8f7f0;
      --rule: #e2ddd6;
      --btn-bg: #1c1c1c;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      min-height: 100vh;
      padding-bottom: 60px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .topbar {
      background: var(--ink);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar h1 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .topbar .date-badge {
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 0.06em;
    }

    /* ── LAYOUT ── */
    .container { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

    /* ── TODAY STATS STRIP ── */
    .stats-strip {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 14px 10px;
      text-align: center;
    }
    .stat-card .val {
      font-size: 1.6rem;
      font-weight: 600;
      line-height: 1;
      color: var(--ink);
    }
    .stat-card .lbl {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-top: 5px;
    }
    .stat-card.today .val { color: var(--accent); }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 12px;
      padding-left: 2px;
    }

    /* ── SERVICE ROWS ── */
    .services { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

    .service-row {
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .service-info { flex: 1; min-width: 0; }
    .service-name {
      font-size: 0.95rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .service-price {
      font-size: 0.75rem;
      color: var(--ink-light);
      margin-top: 1px;
    }

    .counter {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid var(--rule);
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .counter button {
      width: 38px;
      height: 38px;
      background: var(--bg);
      border: none;
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--ink);
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .counter button:active { background: var(--rule); }
    .counter button.plus { background: var(--accent-light); color: var(--accent); }
    .counter button.plus:active { background: #f5d5ca; }
    .counter .count-val {
      width: 38px;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--ink);
      border-left: 1px solid var(--rule);
      border-right: 1px solid var(--rule);
      line-height: 38px;
      user-select: none;
    }

    /* ── SAVE BUTTON ── */
    .save-btn {
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 10px;
      -webkit-tap-highlight-color: transparent;
    }
    .save-btn:active { background: #158a4f; transform: scale(0.99); }

    .reset-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--ink-light);
      border: 1px solid var(--rule);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 28px;
      -webkit-tap-highlight-color: transparent;
    }
    .reset-btn:active { background: var(--rule); }

    /* ── HISTORY ── */
    .history-section { margin-top: 4px; }
    .history-card {
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .history-header {
      padding: 12px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-date {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
    }
    .history-total {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 600;
    }
    .history-body { padding: 10px 16px 12px; }
    .history-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      padding: 3px 0;
      color: var(--ink-light);
    }
    .history-row span:last-child { font-weight: 500; color: var(--ink); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: #fff;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 0.88rem;
      font-weight: 500;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .divider {
      height: 1px;
      background: var(--rule);
      margin: 20px 0;
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1>✂ Glamour Hair Art</h1>
  <span class="date-badge" id="topDate"></span>
</div>

<div class="container">

  <!-- Stats Strip -->
  <div class="stats-strip">
    <div class="stat-card today">
      <div class="val" id="statToday">0</div>
      <div class="lbl">Today</div>
    </div>
    <div class="stat-card">
      <div class="val" id="statWeek">0</div>
      <div class="lbl">This Week</div>
    </div>
    <div class="stat-card">
      <div class="val" id="statMonth">0</div>
      <div class="lbl">This Month</div>
    </div>
  </div>

  <!-- Service Counters -->
  <div class="section-label">Today's Customers</div>
  <div class="services" id="serviceList"></div>

  <!-- Actions -->
  <button class="save-btn" onclick="saveDay()">✓ Save Today's Count</button>
  <button class="reset-btn" onclick="resetCounters()">Reset Counters</button>

  <div class="divider"></div>

  <!-- History -->
  <div class="history-section">
    <div class="section-label">Past Records</div>
    <div id="historyList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const SERVICES = [
    { id: 'haircut_regular',  name: 'Regular Haircut',         price: '₹50' },
    { id: 'haircut_premium',  name: 'Premium Haircut',         price: '₹80' },
    { id: 'beard_trim',       name: 'Beard Trim',              price: '₹30' },
    { id: 'beard_shape',      name: 'Beard Shaping',           price: '₹50' },
    { id: 'head_massage',     name: 'Head Massage',            price: '₹60' },
    { id: 'combo_hb',         name: 'Haircut + Beard',         price: '₹70' },
    { id: 'combo_hbm',        name: 'Haircut + Beard + Massage', price: '₹120' },
  ];

  // Current session counts
  let counts = {};
  SERVICES.forEach(s => counts[s.id] = 0);

  // ── RENDER SERVICE ROWS ──
  function renderServices() {
    const list = document.getElementById('serviceList');
    list.innerHTML = '';
    SERVICES.forEach(s => {
      const row = document.createElement('div');
      row.className = 'service-row';
      row.innerHTML = `
        <div class="service-info">
          <div class="service-name">${s.name}</div>
          <div class="service-price">${s.price}</div>
        </div>
        <div class="counter">
          <button class="minus" onclick="change('${s.id}', -1)">−</button>
          <div class="count-val" id="cnt_${s.id}">0</div>
          <button class="plus" onclick="change('${s.id}', 1)">+</button>
        </div>
      `;
      list.appendChild(row);
    });
  }

  function change(id, delta) {
    counts[id] = Math.max(0, counts[id] + delta);
    document.getElementById('cnt_' + id).textContent = counts[id];
    updateTodaystat();
  }

  function updateTodaystat() {
    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    document.getElementById('statToday').textContent = total;
  }

  // ── DATE HELPERS ──
  function todayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function formatDate(key) {
    const [y, m, d] = key.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
  }

  function weekKey(dateKey) {
    const d = new Date(dateKey);
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    const mon = new Date(d.setDate(diff));
    return `${mon.getFullYear()}-W${String(Math.ceil(mon.getDate()/7)).padStart(2,'0')}-${String(mon.getMonth()+1).padStart(2,'0')}`;
  }

  function monthKey(dateKey) {
    return dateKey.slice(0, 7);
  }

  // ── LOAD HISTORY FROM LOCALSTORAGE ──
  function getHistory() {
    try { return JSON.parse(localStorage.getItem('gha_history') || '{}'); }
    catch { return {}; }
  }

  function saveHistory(h) {
    localStorage.setItem('gha_history', JSON.stringify(h));
  }

  // ── SAVE DAY ──
  function saveDay() {
    const total = Object.values(counts).reduce((a,b) => a+b, 0);
    if (total === 0) { showToast('Nothing to save — add some customers first'); return; }

    const key = todayKey();
    const history = getHistory();
    history[key] = { ...counts, _total: total };
    saveHistory(history);

    updateStats();
    renderHistory();
    showToast('Saved! ' + total + ' customer' + (total > 1 ? 's' : '') + ' today');
  }

  // ── RESET ──
  function resetCounters() {
    SERVICES.forEach(s => {
      counts[s.id] = 0;
      const el = document.getElementById('cnt_' + s.id);
      if (el) el.textContent = '0';
    });
    updateTodaystat();
  }

  // ── UPDATE WEEK / MONTH STATS ──
  function updateStats() {
    const history = getHistory();
    const today = todayKey();
    const thisWeek = weekKey(today);
    const thisMonth = monthKey(today);

    let weekTotal = 0, monthTotal = 0;

    Object.entries(history).forEach(([key, val]) => {
      if (monthKey(key) === thisMonth) monthTotal += val._total || 0;
      if (weekKey(key) === thisWeek) weekTotal += val._total || 0;
    });

    document.getElementById('statWeek').textContent = weekTotal;
    document.getElementById('statMonth').textContent = monthTotal;
  }

  // ── RENDER HISTORY ──
  function renderHistory() {
    const history = getHistory();
    const keys = Object.keys(history).sort().reverse().slice(0, 14); // last 14 days
    const container = document.getElementById('historyList');

    if (keys.length === 0) {
      container.innerHTML = '<p style="font-size:0.82rem;color:#999;text-align:center;padding:20px 0;">No records yet. Save today\'s count to get started.</p>';
      return;
    }

    container.innerHTML = '';
    keys.forEach(key => {
      const day = history[key];
      const card = document.createElement('div');
      card.className = 'history-card';

      const rows = SERVICES
        .filter(s => day[s.id] > 0)
        .map(s => `<div class="history-row"><span>${s.name}</span><span>${day[s.id]}</span></div>`)
        .join('');

      card.innerHTML = `
        <div class="history-header">
          <span class="history-date">${formatDate(key)}</span>
          <span class="history-total">${day._total} customers</span>
        </div>
        <div class="history-body">${rows || '<span style="font-size:0.8rem;color:#aaa">No service breakdown</span>'}</div>
      `;
      container.appendChild(card);
    });
  }

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── INIT ──
  function init() {
    // Date in topbar
    const d = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('topDate').textContent =
      `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`;

    renderServices();
    updateStats();
    renderHistory();
  }

  init();
</script>
</body>
</html>
